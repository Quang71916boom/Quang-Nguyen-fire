<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in with Google...</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }
    </style>
</head>
<body class="bg-[#0E0F11] text-[#E2E8F0] min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-md w-full bg-[#15171C] border border-[#232731] rounded-2xl p-8 shadow-2xl flex flex-col items-center gap-6">
        <!-- App Icon / Brand -->
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center bg-gradient-to-br from-indigo-500 to-rose-500 border border-indigo-400/30 shadow-2xl text-white text-3xl select-none animate-pulse">
            🔥
        </div>

        <div id="status-container" class="flex flex-col items-center gap-2">
            <h2 id="status-title" class="text-xl font-medium tracking-tight text-white">Connecting to Google</h2>
            <p id="status-desc" class="text-sm text-gray-400">Please wait while we redirect you to Google's secure login screen...</p>
        </div>

        <!-- Spinner loader -->
        <div id="spinner" class="relative w-12 h-12">
            <div class="absolute inset-0 rounded-full border-t-2 border-b-2 border-indigo-500 animate-spin"></div>
            <div class="absolute inset-1.5 rounded-full border-r-2 border-l-2 border-cyan-500 animate-pulse"></div>
        </div>

        <div id="error-actions" class="hidden flex flex-col gap-3 w-full mt-4">
            <button onclick="window.retryLogin()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl text-sm transition duration-200 shadow-md cursor-pointer">
                Try Again
            </button>
            <button onclick="window.closePopup()" class="w-full py-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-xl text-sm transition duration-200 border border-[#232731] cursor-pointer">
                Cancel
            </button>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        const titleEl = document.getElementById('status-title');
        const descEl = document.getElementById('status-desc');
        const spinnerEl = document.getElementById('spinner');
        const errorActionsEl = document.getElementById('error-actions');

        let auth = null;

        window.closePopup = () => {
            window.close();
        };

        window.retryLogin = async () => {
            if (!auth) return;
            errorActionsEl.classList.add('hidden');
            spinnerEl.classList.remove('hidden');
            titleEl.innerText = "Connecting to Google";
            descEl.innerText = "Please wait while we redirect you to Google's secure login screen...";
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                await signInWithRedirect(auth, provider);
            } catch (err) {
                handleError(err);
            }
        };

        function handleError(err) {
            console.error('OAuth popup error:', err);
            titleEl.innerText = "Authentication Failed";
            descEl.innerText = err.message || "An error occurred during authentication.";
            spinnerEl.classList.add('hidden');
            errorActionsEl.classList.remove('hidden');

            // Notify parent iframe about the error
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GOOGLE_SIGN_IN_ERROR',
                    error: err.message || "Authentication error."
                }, '*');
            }
        }

        async function init() {
            try {
                // Fetch firebase configurations
                const configRes = await fetch("/firebase-applet-config.json");
                if (!configRes.ok) {
                    throw new Error("Failed to load Firebase configuration file.");
                }
                const firebaseConfig = await configRes.json();
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);

                // Check if we are returning from Google redirect
                titleEl.innerText = "Verifying Credentials";
                descEl.innerText = "Exchanging tokens with Google authentication servers...";

                const result = await getRedirectResult(auth);
                if (result) {
                    // Success! Get the credential
                    const credential = GoogleAuthProvider.credentialFromResult(result);
                    if (credential) {
                        const payload = {
                            type: 'GOOGLE_SIGN_IN_SUCCESS',
                            idToken: credential.idToken,
                            accessToken: credential.accessToken,
                            displayName: result.user.displayName || 'User'
                        };

                        // 1. Post back to parent iframe
                        if (window.opener) {
                            try {
                                window.opener.postMessage(payload, '*');
                            } catch (e) {
                                console.error("postMessage failed:", e);
                            }
                            try {
                                // Try to redirect parent to root / as requested
                                window.opener.location.href = window.location.origin + '/';
                            } catch (e) {
                                console.error("Opener location redirect failed:", e);
                            }
                        }

                        // 2. Save to local storage as fallback
                        localStorage.setItem('google_sign_in_success', JSON.stringify({
                            ...payload,
                            timestamp: Date.now()
                        }));

                        titleEl.innerText = "Success!";
                        descEl.innerText = "Authenticated successfully! Redirecting to Firestorm Chess...";
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } else {
                        throw new Error("Failed to retrieve Google Auth credentials from result.");
                    }
                } else {
                    // This is the first load, trigger Google Redirect
                    titleEl.innerText = "Redirecting to Google";
                    descEl.innerText = "Directing you to the Google account sign-in page...";
                    const provider = new GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    await signInWithRedirect(auth, provider);
                }
            } catch (err) {
                handleError(err);
            }
        }

        init();
    </script>
</body>
</html>
